; SILENT-001 Firmware - STM32L476 PlatformIO Configuration
; PlatformIO Project Configuration File

[platformio]
src_dir = ../src
include_dir = ../include
default_envs = nucleo_l476rg

[env:nucleo_l476rg]
platform = ststm32
board = nucleo_l476rg
framework = stm32cube
build_type = release
monitor_speed = 115200
monitor_filters = colorize
upload_protocol = stlink
debug_tool = stlink

; Build flags for optimization
build_flags =
    -Ofast
    -DUSE_HAL_DRIVER
    -DSTM32L476xx
    -DCORE_CM4
    -DSTM32L4xx

; Link-time optimization
extra_scripts = pre:extra_script.py

; Library dependencies
lib_deps =

[env:debug]
extends = env:nucleo_l476rg
build_type = debug
build_flags =
    -O0
    -g3
    -DUSE_HAL_DRIVER
    -DSTM32L476xx
    -DDEBUG_EMG=1

[env:production]
extends = env:nucleo_l476rg
build_flags =
    -Ofast
    -DUSE_HAL_DRIVER
    -DSTM32L476xx
    -DPRODUCTION_BUILD=1